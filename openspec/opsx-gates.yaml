# opsx-gates.yaml — validation gates for the cartwmic dotfiles repo.
# opsx gate runs each command by exit code: required:true non-zero = GATE-FAIL,
# required:false non-zero = warning. Commands run with cwd = the located
# implementation worktree and OPSX_CHANGE / OPSX_CHANGE_DIR / OPSX_WORKTREE /
# OPSX_DIFF_BASE / OPSX_HEAD exported.
gates:
  - id: openspec-validate
    run: openspec validate --changes --strict
    required: true
  - id: gate-self-syntax
    run: bash -n dot_local/bin/executable_opsx
    required: true
  - id: shell-syntax
    run: 'for f in dot_local/bin/executable_*; do bash -n "$f" || exit 1; done'
    required: true
  - id: opsx-loop-extension-tests
    run: bun test dot_pi/agent/extensions/opsx-loop/
    required: true
  - id: opsx-cli-tests
    run: bash tests/opsx-cli/test_opsx_cli.sh
    required: true
  - id: opsx-gate-tests
    run: bash tests/opsx-gate/test_opsx_gate.sh
    required: true
  - id: opsx-models-tests
    run: bash tests/opsx-models/test_opsx_models.sh
    required: true
  - id: opsx-review-convergence-surface-tests
    run: bash tests/opsx-review-convergence/test_review_convergence_surfaces.sh
    required: true
  - id: jira-extension-tests
    run: bun test dot_pi/agent/extensions/jira/
    required: true
